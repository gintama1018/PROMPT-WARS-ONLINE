name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  PORT: "8080"
  BASE_PATH: "/"
  NODE_ENV: test

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Test Coverage
        run: pnpm run test:coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./artifacts/election-guide/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: E2E Tests
        run: pnpm -F @workspace/election-guide run test:e2e
        if: always()

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: artifacts/election-guide/playwright-report/

      - name: Build
        run: pnpm run build
