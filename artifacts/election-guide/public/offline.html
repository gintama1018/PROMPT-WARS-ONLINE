<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | The People's Election Guide</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: linear-gradient(120deg, #f0fdfa, #ecfeff);
        color: #0f172a;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .card {
        max-width: 36rem;
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 1rem;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        padding: 1.5rem;
      }
      h1 {
        margin-top: 0;
      }
      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        The People's Election Guide is not connected right now. You can still
        reopen pages you have visited before, and chat features will resume when
        your connection returns.
      </p>
    </main>
  </body>
</html>
